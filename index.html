<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2周年オープニング</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #00FF00;
  overflow: hidden;
}

/* ありがとう */
#thanks {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: clamp(24px, 5vw, 48px);
  font-weight: bold;
  color: black;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.show {
  opacity: 1;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="thanks">【2周年ありがとう】</div>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let font;
const text = "地震 / 気象 / 交通情報\n共有オープンチャット";

let segments = [];
let progress = 0;

/* 高解像度対応 */
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;

  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;

  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

/* 線生成 */
function generateText() {
  segments = [];

  const fontSize = Math.min(window.innerWidth / 12, 80);

  const path = font.getPath(
    text,
    window.innerWidth * 0.1,
    window.innerHeight * 0.5,
    fontSize
  );

  const commands = path.commands;
  let prev = null;

  commands.forEach(cmd => {

    if (cmd.type === "M") {
      prev = {x: cmd.x, y: cmd.y};
    }

    else if (cmd.type === "L") {
      segments.push({
        x1: prev.x,
        y1: prev.y,
        x2: cmd.x,
        y2: cmd.y
      });
      prev = {x: cmd.x, y: cmd.y};
    }

    else if (cmd.type === "Q" || cmd.type === "C") {
      const steps = 6;

      for (let i = 0; i < steps; i++) {
        const t = i / steps;

        const x = prev.x + (cmd.x - prev.x) * t;
        const y = prev.y + (cmd.y - prev.y) * t;

        segments.push({
          x1: prev.x,
          y1: prev.y,
          x2: x,
          y2: y
        });

        prev = {x, y};
      }
    }

  });

  /* バラバラ配置 */
  segments.forEach(s => {
    s.sx = Math.random() * window.innerWidth;
    s.sy = Math.random() * window.innerHeight;
  });

  progress = 0;
}

/* アニメーション */
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  segments.forEach(s => {
    const t = Math.min(progress / 100, 1);

    const x1 = s.sx + (s.x1 - s.sx) * t;
    const y1 = s.sy + (s.y1 - s.sy) * t;
    const x2 = s.sx + (s.x2 - s.sx) * t;
    const y2 = s.sy + (s.y2 - s.sy) * t;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);

    ctx.strokeStyle = "black";
    ctx.lineWidth = 2;

    ctx.shadowBlur = 6;
    ctx.shadowColor = "black";

    ctx.stroke();
  });

  progress += 1.5;

  requestAnimationFrame(animate);
}

/* 初期化 */
resizeCanvas();

opentype.load("./font/NotoSansJP-Bold.ttf", function(err, f) {
  if (err) {
    alert("フォント読み込み失敗");
    return;
  }

  font = f;

  generateText();
  animate();

  setTimeout(() => {
    document.getElementById("thanks").classList.add("show");
  }, 4000);
});

/* リサイズ対応 */
window.addEventListener("resize", () => {
  resizeCanvas();
  if (font) generateText();
});
</script>

</body>
</html>
